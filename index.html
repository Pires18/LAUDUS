<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA & Mobile Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0568c5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0c" media="(prefers-color-scheme: dark)" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Apple PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LAUD.US" />

    <!-- Apple Splash Screens (generated from icon-512x512) -->
    <!-- iPhone 15 Pro Max, 14 Pro Max -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone 15 Pro, 14 Pro -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone 14, 13, 12 -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone SE 3rd, 8, 7 -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <!-- iPhone 15 Plus, 14 Plus -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPad Pro 12.9" -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" />
    <!-- iPad Pro 11" -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2)" />
    <!-- iPad Air / iPad 10th gen -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2)" />
    <!-- iPad Mini -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 744px) and (device-height: 1133px) and (-webkit-device-pixel-ratio: 2)" />

    <!-- Windows Tile -->
    <meta name="msapplication-TileColor" content="#0568c5" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <!-- SEO -->
    <title>LAUD.US | Plataforma Inteligente de Laudos</title>
    <meta name="description" content="Plataforma profissional de laudos ultrassonográficos com IA integrada. Gestão de exames, templates inteligentes e assinatura digital." />
    <meta name="application-name" content="LAUD.US" />

    <!-- Prevent phone number auto-linking on mobile -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Google API para o Picker -->
    <script src="https://apis.google.com/js/api.js"></script>
  </head>
  <body>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0c;color:#fff;font-family:system-ui;text-align:center;padding:2rem;">
        <div>
          <h1 style="font-size:1.5rem;font-weight:900;margin-bottom:1rem;">LAUD.US</h1>
          <p style="color:#8592a8;">É necessário habilitar o JavaScript para utilizar esta plataforma.</p>
        </div>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
