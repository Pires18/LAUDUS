<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- LAUD.US — marca padrão (idêntica ao LogoIcon do app): ondas de ultrassom -->
  <defs>
    <linearGradient id="laudus-blue" x1="0" y1="100" x2="100" y2="0">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <style>
      .laudus-bg { fill: #ffffff; }
      @media (prefers-color-scheme: dark) {
        .laudus-bg { fill: #1e222a; }
      }
    </style>
  </defs>
  <!-- Fundo arredondado — branco no claro, grafite no escuro (acompanha o SO/navegador) -->
  <rect class="laudus-bg" x="3" y="3" width="94" height="94" rx="22" />
  <!-- Onda 1 (interna) -->
  <path d="M 39 74.4 A 14 14 0 0 1 61 74.4" stroke="url(#laudus-blue)" stroke-width="6" stroke-linecap="round" />
  <!-- Onda 2 (média) -->
  <path d="M 29 56.4 A 29 29 0 0 1 71 56.4" stroke="url(#laudus-blue)" stroke-width="6" stroke-linecap="round" />
  <!-- Onda 3 (externa) -->
  <path d="M 19 38.4 A 44 44 0 0 1 81 38.4" stroke="url(#laudus-blue)" stroke-width="6" stroke-linecap="round" />
</svg>
